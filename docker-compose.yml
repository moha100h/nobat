version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: nobat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nobat}
      POSTGRES_USER: ${POSTGRES_USER:-nobat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-nobat}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: nobat_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nobat_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
  master_bot:
    build:
      context: .
      dockerfile: master_bot/Dockerfile
    container_name: nobat_master_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - backups:/app/backups
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: nobat_scheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - backups:/app/backups
volumes:
  postgres_data:
  redis_data:
  uploads:
  backups:
